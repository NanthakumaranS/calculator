<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nandha Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .calc {
    width: 320px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Display */
  .display {
    padding: 24px 20px 16px;
    background: #0e0e0e;
    border-bottom: 1px solid #1e1e1e;
    text-align: right;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .display .expr {
    font-size: 13px;
    color: #3a3a3a;
    margin-bottom: 6px;
    min-height: 18px;
    letter-spacing: 0.05em;
  }

  .display .result {
    font-size: 42px;
    font-weight: 300;
    color: #f5f0e8;
    letter-spacing: -0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Buttons grid */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: #1a1a1a;
  }

  button {
    padding: 18px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    background: #161616;
    color: #e8e4dc;
    letter-spacing: 0.02em;
  }

  button:hover { background: #202020; }
  button:active { background: #2a2a2a; transform: scale(0.96); }

  /* Operator buttons */
  button.op {
    color: #c9a96e;
    font-size: 18px;
    font-weight: 500;
  }
  button.op:hover { background: #1e1a12; }

  /* Clear / special */
  button.fn {
    color: #8a8a8a;
    font-size: 14px;
  }
  button.fn:hover { background: #1c1c1c; }

  /* Equals */
  button.eq {
    background: #c9a96e;
    color: #0e0e0e;
    font-size: 20px;
    font-weight: 500;
  }
  button.eq:hover { background: #e8cfa0; }
  button.eq:active { background: #a8854a; transform: scale(0.96); }

  /* Zero spans 2 cols */
  button.zero { grid-column: span 2; text-align: left; padding-left: 24px; }

  .brand {
    text-align: center;
    padding: 10px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #2a2a2a;
    text-transform: uppercase;
    border-top: 1px solid #1a1a1a;
  }
</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    <button class="fn" onclick="clearAll()">AC</button>
    <button class="fn" onclick="toggleSign()">+/-</button>
    <button class="fn" onclick="percent()">%</button>
    <button class="op" onclick="setOp('/')">÷</button>

    <button onclick="input('7')">7</button>
    <button onclick="input('8')">8</button>
    <button onclick="input('9')">9</button>
    <button class="op" onclick="setOp('*')">×</button>

    <button onclick="input('4')">4</button>
    <button onclick="input('5')">5</button>
    <button onclick="input('6')">6</button>
    <button class="op" onclick="setOp('-')">−</button>

    <button onclick="input('1')">1</button>
    <button onclick="input('2')">2</button>
    <button onclick="input('3')">3</button>
    <button class="op" onclick="setOp('+')">+</button>

    <button class="zero" onclick="input('0')">0</button>
    <button onclick="input('.')">.</button>
    <button class="eq" onclick="calculate()">=</button>
  </div>

  <div class="brand">Nandha</div>
</div>

<script>
  let current = '0';
  let previous = '';
  let operator = null;
  let fresh = false;

  function updateDisplay() {
    const res = document.getElementById('result');
    res.textContent = current.length > 10
      ? parseFloat(current).toExponential(4)
      : current;
    document.getElementById('expr').textContent =
      operator ? previous + ' ' + opSymbol(operator) : '';
  }

  function opSymbol(op) {
    return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
  }

  function input(val) {
    if (fresh) { current = ''; fresh = false; }
    if (val === '.' && current.includes('.')) return;
    if (current === '0' && val !== '.') current = val;
    else current += val;
    updateDisplay();
  }

  function setOp(op) {
    if (operator && !fresh) calculate(true);
    previous = current;
    operator = op;
    fresh = true;
    updateDisplay();
  }

  function calculate(chain = false) {
    if (!operator || !previous) return;
    const a = parseFloat(previous);
    const b = parseFloat(current);
    let res;
    if (operator === '+') res = a + b;
    else if (operator === '-') res = a - b;
    else if (operator === '*') res = a * b;
    else if (operator === '/') res = b === 0 ? 'Error' : a / b;
    current = String(parseFloat(res.toFixed(10)));
    if (!chain) { operator = null; previous = ''; }
    fresh = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; previous = ''; operator = null; fresh = false;
    updateDisplay();
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay();
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    else if (e.key === '.') input('.');
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
